<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Guitar Chord Finder | Joshua Nathaniel</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --surface: #22223a;
      --gold: #f0c040;
      --gold-dark: #c9952a;
      --text: #e0d9cc;
      --muted: #888;
      --string: #ccc;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Trebuchet MS', Arial, sans-serif;
      min-height: 100vh;
    }

    nav {
      background: #0f0f1a;
      padding: 14px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid var(--gold);
    }
    nav a { color: var(--gold); text-decoration: none; font-weight: bold; }
    nav a:hover { color: white; }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    h1 {
      color: var(--gold);
      font-size: 2.4rem;
      text-align: center;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      margin-bottom: 40px;
      font-size: 1rem;
    }

    /* SEARCH BAR */
    .search-area {
      background: var(--surface);
      border: 2px solid var(--gold);
      border-radius: 6px;
      padding: 28px;
      margin-bottom: 32px;
    }

    .search-area label {
      display: block;
      color: var(--gold);
      font-weight: bold;
      margin-bottom: 8px;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .input-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    select, input[type="text"] {
      background: #0f0f1a;
      color: var(--text);
      border: 1px solid #555;
      border-radius: 4px;
      padding: 10px 14px;
      font-size: 1rem;
      font-family: inherit;
    }

    select:focus, input[type="text"]:focus {
      outline: 2px solid var(--gold);
      border-color: var(--gold);
    }

    select { min-width: 140px; }

    .btn {
      background: var(--gold);
      color: #1a1a2e;
      border: none;
      padding: 10px 28px;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }
    .btn:hover { background: var(--gold-dark); }

    /* CHORD DISPLAY */
    .chord-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 24px;
    }

    .chord-card {
      background: var(--surface);
      border: 1px solid #444;
      border-radius: 6px;
      padding: 20px;
      text-align: center;
      transition: border-color 0.2s, transform 0.1s;
    }
    .chord-card:hover {
      border-color: var(--gold);
      transform: translateY(-2px);
    }

    .chord-name {
      font-size: 1.6rem;
      font-weight: bold;
      color: var(--gold);
      margin-bottom: 4px;
    }
    .chord-type {
      color: var(--muted);
      font-size: 0.82rem;
      margin-bottom: 14px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* SVG CHORD DIAGRAM */
    .chord-diagram svg {
      display: block;
      margin: 0 auto;
    }

    .fingers {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 10px;
    }

    /* STATUS */
    .status-msg {
      text-align: center;
      color: var(--muted);
      font-size: 1rem;
      padding: 40px;
    }

    .loading {
      text-align: center;
      padding: 40px;
    }
    .spinner {
      display: inline-block;
      width: 36px;
      height: 36px;
      border: 4px solid #333;
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      text-align: center;
      padding: 30px;
      color: var(--muted);
      font-size: 0.85rem;
      border-top: 1px solid #333;
      margin-top: 60px;
    }
    footer a { color: var(--gold); }
  </style>
</head>

// ── DRAW CHORD DIAGRAM ──────────────────────────────────────────────────────
function drawChord(frets) {
  const W = 160, H = 140;
  const stringSpacing = 20;
  const fretSpacing = 24;
  const startX = 28, startY = 36;
  const numStrings = 6, numFrets = 5;

  // Find the minimum fret (excluding 0 and -1) to determine position
  const playedFrets = frets.filter(f => f > 0);
  let minFret = playedFrets.length ? Math.min(...playedFrets) : 1;
  let maxFret = playedFrets.length ? Math.max(...playedFrets) : 5;
  let position = minFret > 1 ? minFret : 1;
  if (maxFret - position > 4) position = minFret;

  let svg = `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;

  // Fret position label
  if (position > 1) {
    svg += `<text x="${startX - 8}" y="${startY + 6}" font-size="11" fill="#f0c040" text-anchor="end" font-family="monospace">${position}fr</text>`;
  }

  // Draw nut (thick top bar) if at position 1
  if (position === 1) {
    svg += `<rect x="${startX}" y="${startY - 6}" width="${(numStrings-1)*stringSpacing}" height="5" fill="#e0d9cc" rx="1"/>`;
  }

  // Draw fret lines
  for (let f = 0; f <= numFrets; f++) {
    const y = startY + f * fretSpacing;
    svg += `<line x1="${startX}" y1="${y}" x2="${startX + (numStrings-1)*stringSpacing}" y2="${y}" stroke="#555" stroke-width="1"/>`;
  }

  // Draw strings
  for (let s = 0; s < numStrings; s++) {
    const x = startX + s * stringSpacing;
    svg += `<line x1="${x}" y1="${startY}" x2="${x}" y2="${startY + numFrets * fretSpacing}" stroke="#ccc" stroke-width="1.5"/>`;
  }

  // Draw open/muted markers above nut
  for (let s = 0; s < numStrings; s++) {
    const x = startX + s * stringSpacing;
    const f = frets[s];
    if (f === -1) {
      // Muted (X)
      svg += `<text x="${x}" y="${startY - 10}" font-size="13" fill="#888" text-anchor="middle" font-family="monospace">✕</text>`;
    } else if (f === 0) {
      // Open (O)
      svg += `<circle cx="${x}" cy="${startY - 12}" r="6" fill="none" stroke="#f0c040" stroke-width="1.5"/>`;
    }
  }

  // Draw finger dots
  for (let s = 0; s < numStrings; s++) {
    const f = frets[s];
    if (f > 0) {
      const adjustedFret = f - position + 1;
      if (adjustedFret >= 1 && adjustedFret <= numFrets) {
        const cx = startX + s * stringSpacing;
        const cy = startY + (adjustedFret - 0.5) * fretSpacing;
        svg += `<circle cx="${cx}" cy="${cy}" r="9" fill="#f0c040"/>`;
      }
    }
  }

  svg += `</svg>`;
  return svg;
}

// ── MAIN FIND FUNCTION ───────────────────────────────────────────────────────
async function findChord() {
  const note = document.getElementById('noteSelect').value;
  const type = document.getElementById('typeSelect').value;

  if (!note || !type) {
    document.getElementById('output').innerHTML = `<p class="status-msg">Please select both a <strong style="color:var(--gold)">note</strong> and a <strong style="color:var(--gold)">chord type</strong>.</p>`;
    return;
  }

  const typeLabels = {
    major:'Major', minor:'Minor', '7':'Dominant 7th',
    maj7:'Major 7th', min7:'Minor 7th', sus2:'Sus2',
    sus4:'Sus4', dim:'Diminished', aug:'Augmented'
  };

  document.getElementById('output').innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <p style="color:var(--muted)">Looking up ${note} ${typeLabels[type]}...</p>
    </div>`;

  // Try direct lookup first
  const key = `${note} ${type}`;
  const chord = CHORDS[key];

  await new Promise(r => setTimeout(r, 400)); // brief visual delay

  if (chord) {
    renderChord(note, type, typeLabels[type], chord);
  } else {
    // Use Claude API to describe the chord theory
    await fetchFromClaude(note, type, typeLabels[type]);
  }
}

function renderChord(note, type, typeLabel, chord) {
  const chordName = `${note} ${typeLabel}`;
  const diagram = drawChord(chord.frets);
  const fretsDisplay = chord.frets.map(f => f === -1 ? 'X' : f).join(' ');

  document.getElementById('output').innerHTML = `
    <div style="margin-bottom: 24px;">
      <h3 style="color:var(--gold); font-size:1.3rem; margin-bottom:4px;">${chordName}</h3>
      <p style="color:var(--muted); font-size:0.88rem;">Notes: ${chord.notes.join(' – ')}</p>
    </div>
    <div class="chord-grid" style="grid-template-columns: 1fr;">
      <div class="chord-card" style="max-width: 260px;">
        <div class="chord-name">${note}${type === 'major' ? '' : type === 'minor' ? 'm' : type}</div>
        <div class="chord-type">${typeLabel}</div>
        <div class="chord-diagram">${diagram}</div>
        <div class="fingers" style="margin-top:12px; color:var(--muted); font-size:0.8rem;">
          Frets: ${fretsDisplay}
        </div>
        <p style="margin-top:14px; font-size:0.88rem; color:#bbb; line-height:1.6;">${chord.desc}</p>
      </div>
    </div>
    <div style="margin-top:32px; background:var(--surface); border-left:3px solid var(--gold); padding:20px; border-radius:4px;">
      <h4 style="color:var(--gold); margin-bottom:8px; font-size:1rem;">Music Theory</h4>
      <div id="theorySection"><p style="color:var(--muted)">Loading theory info...</p></div>
    </div>`;

  fetchTheory(note, type, typeLabel);
}

async function fetchTheory(note, type, typeLabel) {
  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        messages: [{
          role: "user",
          content: `You are a guitar teacher. Give a short, practical explanation (3-4 sentences, plain text, no markdown) about the ${note} ${typeLabel} chord: when to use it in a song, what songs feature it, and a practice tip. Be specific and helpful for a beginner guitarist.`
        }]
      })
    });
    const data = await response.json();
    const text = data.content?.map(b => b.text || '').join('') || "Couldn't load theory info.";
    document.getElementById('theorySection').innerHTML = `<p style="color:#ccc; line-height:1.7; font-size:0.92rem;">${text}</p>`;
  } catch {
    document.getElementById('theorySection').innerHTML = `<p style="color:var(--muted);">Theory info unavailable offline.</p>`;
  }
}

async function fetchFromClaude(note, type, typeLabel) {
  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        messages: [{
          role: "user",
          content: `You are a guitar expert. Describe the ${note} ${typeLabel} chord in plain text (no markdown). Include: the notes in the chord, a common fingering or fret positions for 6 strings (use X for muted, 0 for open, numbers for frets), what songs commonly use this chord, and a beginner tip. Keep it to 4-5 sentences total.`
        }]
      })
    });
    const data = await response.json();
    const text = data.content?.map(b => b.text || '').join('') || "Could not load chord info.";
    document.getElementById('output').innerHTML = `
      <div style="background:var(--surface); border-left:3px solid var(--gold); padding:24px; border-radius:4px; max-width:700px;">
        <h3 style="color:var(--gold); margin-bottom:12px;">${note} ${typeLabel}</h3>
        <p style="color:#ccc; line-height:1.8; font-size:0.95rem;">${text}</p>
      </div>`;
  } catch {
    document.getElementById('output').innerHTML = `<p class="status-msg">Couldn't load chord info. Check your connection.</p>`;
  }
}
